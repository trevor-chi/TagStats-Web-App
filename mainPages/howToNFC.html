<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TagStats - How To NFC</title>
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/theme.css" rel="stylesheet">

    <style>
        /* prevent horizontal scroll */
        html, body {
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* background image setup */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url('../images/background/stadiumBackground.jpg') center/cover no-repeat;
            filter: brightness(1);
            z-index: -1;
        }

        /* base text styles */
        body {
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        header.header {
            text-align: center;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.65);
            padding: 15px 25px;
            border-radius: 12px;
            display: inline-block;
            margin-left: 50%;
            transform: translateX(-50%);
            backdrop-filter: blur(10px);
        }

        .header-title {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 5px 0;
            color: #ff2d2d;
        }

        .header-subtitle {
            font-size: 1.1rem;
            margin: 0;
            color: #ff2d2d;
        }

        /* video section style */
        section.video-section {
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        /* video container */
        .video-container {
            width: 100%;
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
        }

        /* bottom text */
        .bottom-text {
            text-align: center;
            font-size: 1.2rem;
            color: #ff2d2d;
            font-weight: 600;
            margin: 30px auto;
            line-height: 1.6;
            background: rgba(0, 0, 0, 0.65);
            padding: 20px 35px;
            border-radius: 12px;
            display: block;
            max-width: 650px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- page header -->
        <header class="header">
            <h1 class="header-title">TagStats</h1>
            <p class="header-subtitle">How To NFC</p>
        </header>

        <!-- video section -->
        <section class="video-section">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/SUk2mgQJKfg?vq=hd1080" 
                        title="How To NFC - Video player" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen></iframe>
            </div>
        </section>

        <!-- bottom text -->
        <p class="bottom-text">Now that you know how, go ahead and scan your first tagstats card!</p>

    </div>

</body>

</html>
