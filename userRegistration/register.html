<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TagStats - Create Account</title>

    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/theme.css" rel="stylesheet">

    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 97vh;
        }

        /* keep floating form fields transparent */
        .form-floating .form-control,
        .form-floating .form-select {
            background: transparent !important;
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: none !important;
            font-size: 16px;
        }

        .form-floating .form-control:focus,
        .form-floating .form-select:focus {
            background: transparent !important;
            color: white !important;
            border-color: var(--team-color, #ff2d2d);
            box-shadow: none !important;
        }

        .form-floating label {
            color: white !important;
        }

        .form-floating>label::after {
            background-color: transparent !important;
        }

        /* prevent browser autofill from changing the dark theme */
        .form-control:-webkit-autofill,
        .form-control:-webkit-autofill:hover,
        .form-control:-webkit-autofill:focus,
        .form-control:-webkit-autofill:active {
            -webkit-text-fill-color: #fff !important;
            -webkit-box-shadow: 0 0 0 1000px transparent inset !important;
            box-shadow: 0 0 0 1000px transparent inset !important;
            transition: background-color 9999s ease-out 0s;
            caret-color: #fff;
        }

        /* footer styling */
        .site-footer {
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            font-size: 0.9rem;
            margin-top: 10px;
            background: none !important;
            position: relative;
            z-index: 10;
        }

        .site-footer .footer-link {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: underline;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        /* keep hover simple without fading */
        .site-footer .footer-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <!-- background player image pulled from the current player query param -->
    <img id="playerBackground" src="" alt="Player Background" class="bg-player-img">

    <div class="content-wrapper">
        <div class="brand-title">
            TAGSTATS
        </div>

        <!-- registration card -->
        <div class="unlock-card">
            <div class="player-name">
                Create Account
            </div>

            <p class="activated-text">
                Join TagStats and unlock your collection.
            </p>

            <form action="registerCheck.php" method="post">
                <!-- preserve player and stat type through registration -->
                <input type="hidden" id="playerField" name="player" value="">
                <input type="hidden" id="typeField" name="type" value="">

                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="newEmail" name="newEmail" placeholder="Email" required>
                    <label for="newEmail">Email</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="newPass" name="newPass" placeholder="Password" required>
                    <label for="newPass">Password</label>
                </div>

                <div class="form-floating mb-3">
                    <select class="form-select" id="favTeam" name="favTeam" required>
                        <option value="Arizona Diamonbacks">Arizona Diamondbacks</option>
                        <option value="Atlanta Braves">Atlanta Braves</option>
                        <option value="Baltimore Orioles">Baltimore Orioles</option>
                        <option value="Boston Red Sox">Boston Red Sox</option>
                        <option value="Chicago Cubs">Chicago Cubs</option>
                        <option value="Chicago White Sox">Chicago White Sox</option>
                        <option value="Cincinnati Reds">Cincinnati Reds</option>
                        <option value="Cleveland Guardians">Cleveland Guardians</option>
                        <option value="Colorado Rockies">Colorado Rockies</option>
                        <option value="Detroit Tigers">Detroit Tigers</option>
                        <option value="Houston Astros">Houston Astros</option>
                        <option value="Kansas City Royals">Kansas City Royals</option>
                        <option value="Los Angeles Angels">Los Angeles Angels</option>
                        <option value="Los Angeles Dodgers">Los Angeles Dodgers</option>
                        <option value="Miami Marlins">Miami Marlins</option>
                        <option value="Milwaukee Brewers">Milwaukee Brewers</option>
                        <option value="Minnesota Twins">Minnesota Twins</option>
                        <option value="New York Mets">New York Mets</option>
                        <option value="New York Yankees">New York Yankees</option>
                        <option value="Oakland Athletics">Oakland Athletics</option>
                        <option value="Philadelphia Phillies">Philadelphia Phillies</option>
                        <option value="Pittsburgh Pirates">Pittsburgh Pirates</option>
                        <option value="San Diego Padres">San Diego Padres</option>
                        <option value="San Francisco Giants">San Francisco Giants</option>
                        <option value="Seattle Mariners">Seattle Mariners</option>
                        <option value="St. Louis Cardinals">St. Louis Cardinals</option>
                        <option value="Tampa Bay Rays">Tampa Bay Rays</option>
                        <option value="Texas Rangers">Texas Rangers</option>
                        <option value="Toronto Blue Jays">Toronto Blue Jays</option>
                        <option value="Washington Nationals">Washington Nationals</option>
                    </select>
                    <label for="favTeam">Favorite Team</label>
                </div>

                <button class="unlock-btn" type="submit">Create Account</button>
            </form>
        </div>

        <!-- login shortcut for existing users -->
        <div>
            <span class="secondary-link">Already have an account? </span>
            <a id="loginLink" href="../login/login.html" class="secondary-link">Log In</a>
        </div>
    </div>

    <footer class="site-footer" id="siteFooter">
        <a id="footerLink" href="../mainPages/about.html" class="footer-link">
            Created By Trevor Childers - 2026
        </a>
    </footer>

    <script>
        // read current player context from the query string
        const params = new URLSearchParams(window.location.search);
        const player = params.get("player") || "";
        const type = params.get("type") || "";

        // copy player context into hidden form fields so registration can keep it
        const playerField = document.getElementById("playerField");
        const typeField = document.getElementById("typeField");

        if (playerField) playerField.value = player;
        if (typeField) typeField.value = type;

        // keep player and type params when going to the login page
        const loginLink = document.getElementById("loginLink");
        if (loginLink) {
            const url = new URL(loginLink.getAttribute("href"), window.location.href);
            if (player) url.searchParams.set("player", player);
            if (type) url.searchParams.set("type", type);
            loginLink.href = url.pathname + url.search;
        }

        // player-specific background art and accent colors
        const playerData = {
            "ohtansh01": { img: "../images/action/shoheiAction.png", translateY: "-50%", scale: 1.0, color: "#005A9C" },
            "acunaro01": { img: "../images/action/acunaAction.png", translateY: "-50%", scale: 1.00, color: "#CE1141" },
            "martipe02": { img: "../images/action/martinezAction.png", translateY: "-50%", scale: 1.00, color: "#BD3039" },
            "riverma01": { img: "../images/action/riveraAction.png", translateY: "-50%", scale: 1.00, color: "#003087" },
            "griffke02": { img: "../images/action/griffeyAction.png", translateY: "-50%", scale: 1.00, color: "#005DAA" },
            "maddugr01": { img: "../images/action/madduxAction.png", translateY: "-50%", scale: 1.00, color: "#0E3386" },
            "jonesch06": { img: "../images/action/chipperAction.png", translateY: "-50%", scale: 1.00, color: "#CE1141" },
            "poseybu01": { img: "../images/action/poseyAction.png", translateY: "-50%", scale: 1.00, color: "#FD5A1E" },
            "bondsba01": { img: "../images/action/bondsAction.png", translateY: "-50%", scale: 1.00, color: "#FD5A1E" },
            "pujolal01": { img: "../images/action/pujolsAction.png", translateY: "-50%", scale: 1.00, color: "#C41E3A" }
        };

        // keep player and type params when going to the footer link
        const footerLink = document.getElementById("footerLink");
        if (footerLink) {
            const url = new URL(footerLink.getAttribute("href"), window.location.href);
            if (player) url.searchParams.set("player", player);
            if (type) url.searchParams.set("type", type);
            footerLink.href = url.pathname + url.search;
        }

        // apply the player background image and accent color when available
        const bg = document.getElementById("playerBackground");
        if (player && playerData[player]) {
            const pdata = playerData[player];
            bg.src = pdata.img;
            bg.style.transform = `translate(-50%, ${pdata.translateY}) scale(${pdata.scale || 1})`;
            document.documentElement.style.setProperty("--team-color", pdata.color);
        }
    </script>

    <script src="../css/bootstrap.bundle.min.js"></script>
</body>

</html>
